<div class="bg-[#1B1E31]/40 border border-white/5 p-6 rounded-2xl shadow-lg mb-6 relative overflow-hidden glass-card">
    <i class="fas fa-server absolute right-[-20px] bottom-[-20px] text-[150px] text-white/5 z-0"></i>

    <div class="relative z-10 w-full">

            <i class="fas fa-server text-yellow-400"></i> Server Bot Management
        </h2>
        
        <!-- 4-Way Bot Reserve and Active Stats Counters Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-[#11131a]/80 p-4 rounded-xl border border-white/5 shadow-inner text-center">
                <div class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-1 flex items-center justify-center gap-1">
                    <i class="fas fa-folder-open text-cyan-400"></i> Reserve Tracker (a.json)
                </div>
                <div class="text-2xl font-black text-cyan-400" id="stat-res-a">0</div>
            </div>
            <div class="bg-[#11131a]/80 p-4 rounded-xl border border-white/5 shadow-inner text-center">
                <div class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-1 flex items-center justify-center gap-1">
                    <i class="fas fa-satellite text-emerald-400"></i> Live Tracker (bot.json)
                </div>
                <div class="text-2xl font-black text-emerald-400" id="stat-live-bot">0</div>
            </div>
            <div class="bg-[#11131a]/80 p-4 rounded-xl border border-white/5 shadow-inner text-center">
                <div class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-1 flex items-center justify-center gap-1">
                    <i class="fas fa-folder-open text-fuchsia-400"></i> Reserve Attacker (b.json)
                </div>
                <div class="text-2xl font-black text-fuchsia-400" id="stat-res-b">0</div>
            </div>
            <div class="bg-[#11131a]/80 p-4 rounded-xl border border-white/5 shadow-inner text-center">
                <div class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-1 flex items-center justify-center gap-1">
                    <i class="fas fa-crosshairs text-rose-500"></i> Live Attacker (vv.json)
                </div>
                <div class="text-2xl font-black text-rose-500" id="stat-live-vv">0</div>
            </div>
        </div>

        <!-- Add Manual Single Bot & Bulk Upload Trigger Forms -->
        <div class="bg-[#11131a]/80 p-4 rounded-xl border border-white/5 space-y-4">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div class="w-full relative">
                    <i class="fas fa-fingerprint absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="add-bot-uid" placeholder="Bot UID" class="w-full bg-[#0b0d17]/90 border border-white/10 text-white rounded-xl px-4 py-3 pl-10 outline-none focus:border-yellow-400 font-bold transition">
                </div>
                <div class="w-full relative">
                    <i class="fas fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="add-bot-pwd" placeholder="Password" class="w-full bg-[#0b0d17]/90 border border-white/10 text-white rounded-xl px-4 py-3 pl-10 outline-none focus:border-yellow-400 font-bold transition">
                </div>
                <div class="w-full relative md:w-48">
                    <select id="add-bot-type" class="w-full bg-[#0b0d17]/90 border border-white/10 text-yellow-400 rounded-xl px-4 py-3.5 outline-none focus:border-yellow-400 font-bold transition">
                        <option value="tracker">Tracker Bot (a.json)</option>
                        <option value="attacker">Attacker Bot (b.json)</option>
                    </select>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 pt-2">
                <button onclick="submitManualBot()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl transition uppercase tracking-widest shadow-lg text-xs">
                    <i class="fas fa-plus mr-1"></i> Add Single Bot
                </button>
                <button onclick="openUploadModal()" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-xl transition uppercase tracking-widest shadow-lg text-xs border border-cyan-500/20">
                    <i class="fas fa-cloud-upload-alt mr-1"></i> Upload Bot JSON File
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Dynamic Bot List Visual Board -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="my-bots-list">
    <!-- Loaded dynamically via JavaScript -->
</div>

<!-- =======================================================
     BULK BOT JSON UPLOAD POPUP MODAL
======================================================= -->
<div id="upload-bot-modal" class="fixed inset-0 hidden items-center justify-center bg-black/95 backdrop-blur-sm z-[500] transition-all">
    <div class="bg-[#0f111a] border border-white/10 w-full max-w-[26rem] rounded-[2.5rem] shadow-2xl relative p-6 mx-4">
        
        <!-- Spinning Upload Loader Overlay -->
        <div id="upload-loading-overlay" class="hidden absolute inset-0 bg-black/90 backdrop-blur-md flex flex-col items-center justify-center z-50 rounded-[2.5rem]">
            <div class="relative w-16 h-16 mb-4 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border-4 border-cyan-500/10"></div>
                <div class="absolute inset-0 rounded-full border-4 border-t-cyan-400 border-r-cyan-400 animate-spin"></div>
                <i class="fas fa-database text-cyan-400 text-2xl animate-pulse"></i>
            </div>
            <p class="text-sm font-['Orbitron'] font-black text-white uppercase tracking-widest animate-pulse">Processing Database...</p>
            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">Merging and checking duplicates...</p>
        </div>

        <button onclick="closeUploadModal()" class="absolute top-5 right-5 text-gray-500 hover:text-white bg-gray-800/40 p-2 rounded-full transition"><i class="fas fa-times"></i></button>
        
        <div class="text-center mb-6">
            <div class="w-14 h-14 bg-cyan-500/10 text-cyan-400 rounded-full flex items-center justify-center mx-auto mb-3 border border-cyan-500/20 shadow-lg">
                <i class="fas fa-file-import text-xl"></i>
            </div>
            <h3 class="text-lg font-['Orbitron'] font-black text-white uppercase tracking-widest">UPLOAD BULK BOTS</h3>
            <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">Accepts tracker list or attacker dict formatted .json</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase tracking-wider block mb-1.5 px-1">Select Target Reserve File</label>
                <select id="upload-target-type" class="w-full bg-[#161925]/90 border border-white/10 rounded-xl p-3.5 text-sm font-bold text-yellow-400 outline-none focus:border-yellow-400/50 transition">
                    <option value="a">Tracker Reserve (a.json)</option>
                    <option value="b">Attacker Reserve (b.json)</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase tracking-wider block mb-1.5 px-1">Select JSON File</label>
                <input type="file" id="upload-bot-file-input" accept=".json" class="w-full bg-[#161925]/90 border border-white/10 rounded-xl p-3 text-xs font-bold text-gray-300 outline-none focus:border-cyan-500 transition file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-cyan-500/10 file:text-cyan-400 hover:file:bg-cyan-500/20">
            </div>

            <!-- Action Buttons inside popup modal -->
            <div class="flex gap-4 pt-4">
                <button onclick="closeUploadModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest transition border border-white/5">
                    Cancel
                </button>
                <button onclick="submitBulkBotJson()" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest transition shadow-lg shadow-cyan-500/10">
                    Upload & Merge
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    window.safeRunSection('my-bots', function() {
        window.fetchMyBots = async function() {
            try {
                let res = await fetch('/api/my_bots');
                if (res.status === 401) { 
                    window.location.reload(); 
                    return; 
                }
                let data = await res.json();
                
                // Set the 4-way counters on the dashboard
                document.getElementById('stat-res-a').innerText = data.provided_a || 0;
                document.getElementById('stat-res-b').innerText = data.provided_b || 0;
                document.getElementById('stat-live-bot').innerText = data.provided_bot || 0;
                document.getElementById('stat-live-vv').innerText = data.provided_vv || 0;

                let html = '';
                
                html += `<div class="glass-card p-5 rounded-2xl">
                    <h3 class="text-cyan-400 font-black mb-3 text-sm tracking-widest uppercase flex items-center gap-1.5"><i class="fas fa-satellite"></i> Active Tracker Bots <span class="text-gray-500 ml-2">(${data.provided_bot})</span></h3>
                    <div class="space-y-2 max-h-64 overflow-y-auto pr-2">
                    ${data.bots_live_bot.length === 0 ? '<div class="text-gray-600 text-xs text-center py-4">No bots running.</div>' : ''}
                    ${data.bots_live_bot.map((b,i) => `<div class="flex justify-between items-center p-3 bg-[#11131a]/60 rounded-xl border border-white/5"><span class="text-gray-500 text-xs w-6">${i+1}.</span><span class="text-white font-mono text-sm tracking-widest font-bold flex-1">${b.uid}</span><span class="text-cyan-400 text-[10px] uppercase font-black px-2 py-0.5 bg-cyan-400/10 rounded">Tracking</span></div>`).join('')}
                    </div>
                </div>`;
                
                html += `<div class="glass-card p-5 rounded-2xl">
                    <h3 class="text-rose-500 font-black mb-3 text-sm tracking-widest uppercase flex items-center gap-1.5"><i class="fas fa-crosshairs"></i> Active Attacker Bots <span class="text-gray-500 ml-2">(${data.provided_vv})</span></h3>
                    <div class="space-y-2 max-h-64 overflow-y-auto pr-2">
                    ${data.bots_live_vv.length === 0 ? '<div class="text-gray-600 text-xs text-center py-4">No bots running.</div>' : ''}
                    ${data.bots_live_vv.map((uid,i) => `<div class="flex justify-between items-center p-3 bg-[#11131a]/60 rounded-xl border border-white/5"><span class="text-gray-500 text-xs w-6">${i+1}.</span><span class="text-white font-mono text-sm tracking-widest font-bold flex-1">${uid}</span><span class="text-rose-500 text-[10px] uppercase font-black px-2 py-0.5 bg-rose-500/10 rounded">Attacking</span></div>`).join('')}
                    </div>
                </div>`;
                
                document.getElementById('my-bots-list').innerHTML = html;
            } catch(e) {
                console.error("fetchMyBots failed:", e);
            }
        };

        window.submitManualBot = async function() {
            let uid = document.getElementById('add-bot-uid').value.trim();
            let pwd = document.getElementById('add-bot-pwd').value.trim();
            let type = document.getElementById('add-bot-type').value;

            if(!uid || !pwd) {
                showPopup("Missing Fields", "Please fill in both bot UID and password.", "error");
                return;
            }

            try {
                let res = await fetch('/api/add_bot', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({uid, password: pwd, type})
                });
                let data = await res.json();
                if(data.success) {
                    showPopup("Success", data.msg, "success");
                    document.getElementById('add-bot-uid').value = '';
                    document.getElementById('add-bot-pwd').value = '';
                    fetchMyBots();
                } else {
                    showPopup("Failed", data.msg, "error");
                }
            } catch(e) {
                showPopup("Connection Error", "Could not reach the server.", "error");
            }
        };

        window.openUploadModal = function() {
            document.getElementById('upload-bot-file-input').value = '';
            document.getElementById('upload-bot-modal').classList.replace('hidden', 'flex');
        };

        window.closeUploadModal = function() {
            document.getElementById('upload-bot-modal').classList.replace('flex', 'hidden');
        };

        window.submitBulkBotJson = async function() {
            let fileInput = document.getElementById('upload-bot-file-input');
            let targetType = document.getElementById('upload-target-type').value;

            if (fileInput.files.length === 0) {
                showPopup("No File", "Please select a JSON file to upload.", "error");
                return;
            }

            const loader = document.getElementById('upload-loading-overlay');
            loader.classList.remove('hidden');

            let formData = new FormData();
            formData.append('type', targetType);
            formData.append('file', fileInput.files[0]);

            try {
                let res = await fetch('/api/upload_bots', {
                    method: 'POST',
                    body: formData
                });
                let data = await res.json();
                loader.classList.add('hidden');

                if (data.success) {
                    closeUploadModal();
                    showPopup("Upload Success", data.msg, "success");
                    fetchMyBots();
                } else {
                    showPopup("Upload Failed", data.msg, "error");
                }
            } catch(e) {
                loader.classList.add('hidden');
                showPopup("Connection Error", "Could not complete bulk file upload.", "error");
            }
        };

        window.addEventListener('tabSwitched', function(e) {
            if (e.detail.tab === 'my_bots') {
                fetchMyBots();
            }
        });

        // Initialize My Bots tab stats
        fetchMyBots();
    });
</script>
